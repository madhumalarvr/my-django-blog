<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Todo App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4"> My Todo App</h2>

        <!-- FORM -->
        <form method="POST" class="d-flex gap-2 mb-4">
            {% csrf_token %}
            <input type="text" name="title" class="form-control" placeholder="Enter a task">
            <button type="submit" class="btn btn-primary">Add</button>
        </form>

        <!--TASK LIST -->
        <ul class="list-group">
            {% for task in tasks %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ task.title }}
                    <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">Delete</a>
                </li>
            {% empty %}
                <li class="list-group-item text-center">No tasks yet!</li>
            {% endfor %}
        </ul>
    </div>
</div>

</body>
</html>
